name: Deploy vault-manager

on:
  push:
    branches: [main]
  workflow_dispatch:

# 前端用 GitHub Pages 发布（多端入口），后端用 SCF。两者都是 push main 自动触发。
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # ---------- 后端：SCF（纯 API 服务） ----------
  deploy-scf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Tencent Cloud SDK
        run: pip install tencentcloud-sdk-python-scf

      - name: Deploy to SCF
        env:
          TENCENT_SECRET_ID: ${{ secrets.TENCENT_SECRET_ID }}
          TENCENT_SECRET_KEY: ${{ secrets.TENCENT_SECRET_KEY }}
        run: python deploy_scf.py

      - name: Health check
        run: |
          sleep 5
          URL=$(python -c "import json; cfg=json.load(open('.scf-deploy.json')); print(cfg.get('access_url',''))")
          if [ -n "$URL" ]; then
            echo "Checking $URL/api/health"
            curl -sf -o /dev/null -w "HTTP %{http_code}\n" "$URL/api/health" || echo " (may need warm-up)"
          else
            echo "access_url not set in .scf-deploy.json; skip health check"
          fi

  # ---------- 前端：GitHub Pages（托管 index.html + static/，多端访问入口） ----------
  # 与 SCF 部署解耦：前端可独立发布，即使后端密钥暂未配也能先把页面跑通
  deploy-pages:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
