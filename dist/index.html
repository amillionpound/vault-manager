<!DOCTYPE html>
<html lang="zh-CN">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

<style>
:root{--bg:#f5f6fb;--panel:#fff;--text:#1c2330;--muted:#7a8597;--line:#e6e9f0;--brand:#4f6ef7;--brand-d:#3a57d6;--danger:#e5484d;--ok:#2f9e5e;--warn:#e5a000;
--shadow:0 6px 24px rgba(30,40,80,.08)}
[data-theme=dark]{--bg:#11151c;--panel:#1a212c;--text:#e6ebf2;--muted:#8b97a8;--line:#28313f;--shadow:0 6px 24px rgba(0,0,0,.4)}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;
background:var(--bg);color:var(--text);font-size:15px;line-height:1.5;-webkit-text-size-adjust:100%}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,textarea,select{font-family:inherit;font-size:14px;padding:9px 11px;border:1px solid var(--line);border-radius:9px;background:var(--panel);color:var(--text);width:100%;outline:none}
input:focus,textarea:focus,select:focus{border-color:var(--brand)}
.btn{background:var(--brand);color:#fff;padding:9px 16px;border-radius:9px;font-weight:600;font-size:14px}
.btn:hover{background:var(--brand-d)}.btn.ghost{background:transparent;border:1px solid var(--line);color:var(--text)}.btn.ghost:hover{background:rgba(0,0,0,.04)}.btn.danger{background:var(--danger);color:#fff}
.btn.sm{padding:5px 10px;font-size:12px;border-radius:7px}.btn:disabled{opacity:.5;cursor:not-allowed}
.userrow{display:flex;gap:6px;align-items:center;margin-bottom:8px}.userrow input{flex:1;min-width:0}.btn.sm.danger{padding:5px 8px;font-size:15px;line-height:1}
a{color:var(--brand)}
.hidden{display:none!important}
.wrap{max-width:1100px;margin:0 auto;padding:0 14px}
.topbar{position:sticky;top:0;z-index:30;background:var(--panel);border-bottom:1px solid var(--line);backdrop-filter:blur(8px)}
.topbar .row{display:flex;align-items:center;gap:10px;padding:10px 0}
.logo{font-weight:800;font-size:18px;display:flex;align-items:center;gap:8px}
.logo .dot{width:14px;height:14px;border-radius:5px;background:var(--brand)}
.search{flex:1;max-width:420px}
.search input{padding:7px 11px}
.iconbtn{width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;border:1px solid var(--line);background:var(--panel)}
.iconbtn:hover{border-color:var(--brand)}
.layout{display:flex;gap:16px;align-items:flex-start;padding-top:16px}
.side{width:200px;flex:none;background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:10px;position:sticky;top:70px}
.side h4{margin:6px 8px;font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
.cat{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:9px;cursor:pointer}
.cat:hover{background:var(--bg)}.cat.active{background:var(--brand);color:#fff}
.cat .ic{font-size:16px}.cat .nm{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cat .ct{font-size:12px;opacity:.7}
.addcat{margin-top:6px;width:100%;text-align:left;color:var(--brand);padding:8px 10px}
.main{flex:1;min-width:0}
.toolbar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px;box-shadow:var(--shadow);position:relative}
.card.pin{box-shadow:0 0 0 2px var(--brand) inset,var(--shadow)}
.card .hd{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.card .ttl{font-weight:700;font-size:16px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card .typ{font-size:11px;padding:2px 7px;border-radius:6px;background:var(--bg);color:var(--muted)}
.card .url{color:var(--muted);font-size:13px;margin-bottom:8px;word-break:break-all}
.card .note{font-size:13px;color:var(--muted);margin-bottom:8px;white-space:pre-wrap;word-break:break-word;max-height:80px;overflow:auto}
.users{margin:8px 0;border-top:1px dashed var(--line);padding-top:8px}
.user{display:flex;align-items:center;gap:8px;padding:5px 0;font-size:13px}
.user .un{flex:1;overflow:hidden;text-overflow:ellipsis}
.user .pw{font-family:ui-monospace,monospace;background:var(--bg);padding:2px 7px;border-radius:6px;max-width:140px;overflow:hidden;text-overflow:ellipsis}
.card .acts{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
.chip{font-size:12px;padding:4px 9px;border-radius:7px;border:1px solid var(--line);background:var(--panel)}
.chip:hover{border-color:var(--brand)}
.qrbox{margin-top:10px;text-align:center}
.empty{text-align:center;color:var(--muted);padding:60px 20px}
.modal{position:fixed;inset:0;background:rgba(10,15,25,.5);display:flex;align-items:flex-start;justify-content:center;padding:24px;z-index:50;overflow:auto}
.modal .box{background:var(--panel);border-radius:16px;width:100%;max-width:560px;padding:22px;margin:auto;box-shadow:var(--shadow)}
.modal h3{margin:0 0 14px}
.field{margin-bottom:12px}
.field label{display:block;font-size:13px;color:var(--muted);margin-bottom:5px}
.field .hint{font-size:12px;color:var(--muted);margin-top:4px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.modal .foot{display:flex;gap:10px;justify-content:flex-end;margin-top:16px}
.toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%);background:#1c2330;color:#fff;padding:10px 18px;border-radius:10px;z-index:99;font-size:14px;opacity:0;transition:.25s;pointer-events:none}
.toast.show{opacity:1}
.secret-badge{background:var(--danger);color:#fff;font-size:11px;padding:2px 7px;border-radius:6px}
.tabs{display:flex;gap:6px;margin-bottom:14px}
.tab{padding:7px 14px;border-radius:9px;border:1px solid var(--line);background:var(--panel);font-size:13px}
.tab.active{background:var(--brand);color:#fff;border-color:var(--brand)}
.statgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-bottom:16px}
.stat{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px}
.stat .n{font-size:26px;font-weight:800}.stat .l{color:var(--muted);font-size:13px}
.logline{font-size:13px;padding:6px 0;border-bottom:1px solid var(--line);display:flex;gap:10px}
.logline .t{color:var(--muted);font-size:12px;white-space:nowrap}
.imgrow{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.imgrow img{width:64px;height:64px;object-fit:cover;border-radius:8px;border:1px solid var(--line)}
.lockwrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.lockcard{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:30px;width:100%;max-width:380px;box-shadow:var(--shadow);text-align:center}
.lockcard .big{font-size:40px;margin-bottom:10px}
.autounlock{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:80;font-size:15px;color:var(--muted)}
@media(max-width:720px){.side{display:none}.cards{grid-template-columns:1fr}}
</style>
</head>
<body>
<!-- 登录/初始化/自动解锁 覆盖层 -->
<div id="gate"></div>

<div id="app" class="hidden">
  <div class="topbar"><div class="wrap row">
    <div class="logo"><span class="dot"></span>工程账本</div>
    <div class="search"><input id="search" placeholder="搜索名称 / 链接 / 账号 / 备注…" /></div>
    <button class="iconbtn" id="btnStats" title="统计">📊</button>
    <button class="iconbtn" id="btnShare" title="只读分享">🔗</button>
    <button class="iconbtn" id="btnRecover" title="应急恢复">🛟</button>
    <button class="iconbtn" id="btnSettings" title="设置">⚙</button>
    <button class="iconbtn" id="btnLock" title="立即锁定">🔒</button>
  </div></div>

  <div class="wrap layout">
    <div class="side">
      <h4>视图</h4>
      <div class="cat" data-view="normal"><span class="ic">📁</span><span class="nm">普通区</span></div>
      <div class="cat" data-view="secret" id="secretTab"><span class="ic">🔒</span><span class="nm">绝密区</span></div>
      <h4>分类</h4>
      <div id="catList"></div>
      <button class="addcat" id="btnAddCat">＋ 新建分类</button>
      <h4>其他</h4>
      <div class="cat" data-view="trash"><span class="ic">🗑</span><span class="nm">回收站</span></div>
    </div>
    <div class="main">
      <div class="toolbar">
        <button class="btn" id="btnAdd">＋ 新建条目</button>
        <button class="btn ghost" id="btnTools">🧰 工具</button>
      </div>
      <div id="content"></div>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
"use strict";
/* ============== 基础工具 ============== */
const $ = (s,r=document)=>r.querySelector(s);
const $$ = (s,r=document)=>[...r.querySelectorAll(s)];
const API_BASE=(localStorage.getItem('vlt_api_base')||'https://1256784020-5x5qs04wi9.ap-guangzhou.tencentscf.com').replace(/\/+$/,'');
const enc=new TextEncoder(), dec=new TextDecoder();
const b64u = a=>{const b=btoa(String.fromCharCode(...new Uint8Array(a)));return b.replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');};
const b64d = s=>{s=s.replace(/-/g,'+').replace(/_/g,'/');return Uint8Array.from(atob(s),c=>c.charCodeAt(0));};
const b64 = a=>btoa(String.fromCharCode(...new Uint8Array(a)));
const bytesB64 = b64;
function toast(m,bad){const t=$('#toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t.style.background=bad?'#e5484d':'#1c2330';t._t=setTimeout(()=>t.classList.remove('show'),2200);}
function esc(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function uid(){return crypto.randomUUID?crypto.randomUUID():Date.now().toString(36)+Math.random().toString(36).slice(2);}
function rnd(n){return crypto.getRandomValues(new Uint8Array(n));}
function genSalt(){return b64(rnd(16));}
function now(){return Date.now();}
function fmtDate(ts){if(!ts)return'';const d=new Date(ts);return d.toLocaleString('zh-CN',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});}

/* ============== 密码学（Web Crypto，零知识） ============== */
async function sha256hex(str){const h=await crypto.subtle.digest('SHA-256',enc.encode(str));return [...new Uint8Array(h)].map(b=>b.toString(16).padStart(2,'0')).join('');}
async function deriveKey(password,saltB64){
  const base=await crypto.subtle.importKey('raw',enc.encode(password),'PBKDF2',false,['deriveKey']);
  return crypto.subtle.deriveKey({name:'PBKDF2',salt:b64d(saltB64),iterations:150000,hash:'SHA-256'},
    base,{name:'AES-GCM',length:256},false,['encrypt','decrypt']);
}
async function importDEK(dekBytes){return crypto.subtle.importKey('raw',dekBytes,{name:'AES-GCM'},false,['encrypt','decrypt']);}
async function wrapDEK(kek,dekBytes){const iv=rnd(12);const ct=await crypto.subtle.encrypt({name:'AES-GCM',iv},kek,dekBytes);return b64u(iv)+':'+b64u(ct);}
async function unwrapDEK(kek,wrap){const[i,c]=wrap.split(':');const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64d(i)},kek,b64d(c));return new Uint8Array(pt);}
async function encryptJSON(dekBytes,obj){const k=await importDEK(dekBytes);const iv=rnd(12);const ct=await crypto.subtle.encrypt({name:'AES-GCM',iv},k,enc.encode(JSON.stringify(obj)));return b64u(iv)+':'+b64u(ct);}
async function decryptJSON(dekBytes,cipher){if(!cipher||typeof cipher!=='string'||cipher.indexOf(':')<0)throw new Error('密文格式无效');const k=await importDEK(dekBytes);const[i,c]=cipher.split(':');const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64d(i)},k,b64d(c));return JSON.parse(dec(new Uint8Array(pt)));}
async function encryptBuf(dekBytes,buf){const k=await importDEK(dekBytes);const iv=rnd(12);const ct=await crypto.subtle.encrypt({name:'AES-GCM',iv},k,buf);return b64u(iv)+':'+b64u(ct);}
async function decryptBuf(dekBytes,cipher){const k=await importDEK(dekBytes);const[i,c]=cipher.split(':');const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64d(i)},k,b64d(c));return pt;}

/* ============== 状态 ============== */
const SESSION_DAYS=7, ACCESS_MS=23*3600*1000;
const state={
  accessToken:null, accessExp:0, refreshToken:localStorage.getItem('vlt_refresh')||null,
  view:'normal', activeCat:'__all__',
  vaultKey:null,        // Uint8Array, 普通区 DEK（持久缓存 7 天）
  vaultKeyExp:0,
  secretKey:null,       // Uint8Array, 绝密区 DEK（仅本次会话内存）
  auth:null,            // 来自登录的 auth 公开字段
  data:null,            // 普通区明文
  secret:null,          // 绝密区明文
  needSetup:false,
};

/* ============== API ============== */
async function ensureToken(){
  if(state.accessToken && state.accessExp>Date.now()) return;
  if(!state.refreshToken) throw{needLogin:true};
  const r=await fetch(API_BASE+'/api/refresh',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({refreshToken:state.refreshToken})});
  const j=await r.json().catch(()=>({}));
  if(j.code===0){state.accessToken=j.token;state.accessExp=Date.now()+ACCESS_MS;return;}
  throw{needLogin:true};
}
async function api(path,opts={}){
  const secured=!['/api/login','/api/bootstrap','/api/repair_bootstrap','/api/refresh','/api/recover/verify','/api/recover/setnew','/api/health','/api/force_reset'].some(p=>path.startsWith(p))&&!/^\/api\/share\//.test(path);
  if(secured){try{await ensureToken();}catch(e){if(e.needLogin)return{status:401,data:{code:1,msg:'需重新登录'}};throw e;}}
  const headers={'Content-Type':'application/json'};
  if(state.accessToken)headers['Authorization']='Bearer '+state.accessToken;
  try{
    const r=await fetch(API_BASE+path,{method:opts.method||'GET',headers,body:opts.body?JSON.stringify(opts.body):undefined});
    const data=await r.json().catch(()=>({}));
    if(!data||typeof data!=='object'||typeof data.code==='undefined')return{status:r.status||0,data:{code:-1,msg:'服务器返回异常，请稍后重试'}};
    return{status:r.status,data};
  }catch(e){
    return{status:0,data:{code:-1,msg:'网络错误，无法连接服务器（请检查网络或 ⚙ 里的 API 地址）'}};
  }
}
async function binApi(path,method,body){
  await ensureToken();
  const r=await fetch(API_BASE+path,{method,headers:{'Authorization':'Bearer '+state.accessToken,'Content-Type':'application/octet-stream'},body});
  return{status:r.status,data:await r.json().catch(()=>({}))};
}
async function binGet(path){
  await ensureToken();
  const r=await fetch(API_BASE+path,{headers:{'Authorization':'Bearer '+state.accessToken}});
  if(r.status!==200)throw{status:r.status};
  return r.arrayBuffer();
}

/* ============== 存取密文 ============== */
async function loadVault(){const r=await api('/api/vault');if(r.data.code===0&&r.data.cipher){try{state.data=await decryptJSON(state.vaultKey,r.data.cipher);}catch(e){state.data=newVault();toast('无法解密原有数据（密钥已变更），已显示空白，可通过「设置→导入加密备份」恢复',true);}}else state.data=newVault();}
async function saveVault(){const c=await encryptJSON(state.vaultKey,state.data);await api('/api/vault',{method:'PUT',body:{cipher:c}});}
async function loadSecret(){const r=await api('/api/secret');if(r.data.code===0&&r.data.cipher){try{state.secret=await decryptJSON(state.secretKey,r.data.cipher);}catch(e){state.secret=newSecret();toast('绝密区数据无法解密（密钥不匹配），已显示空白，可用「设置→导入加密备份」恢复',true);}}else state.secret=newSecret();}
async function saveSecret(){const c=await encryptJSON(state.secretKey,state.secret);await api('/api/secret',{method:'PUT',body:{cipher:c}});}
function newVault(){return{categories:[],entries:[],trash:[],logs:[],settings:{clipboardClear:15,theme:'light'}};}
function newSecret(){return{entries:[],trash:[],logs:[]};}

/* ============== 登录态 / 解锁 ============== */
function cacheSession(){
  // 7 天免密：持久化 vaultKey + refreshToken
  state.vaultKeyExp=now()+SESSION_DAYS*86400000;
  localStorage.setItem('vlt_vaultkey',b64(state.vaultKey));
  localStorage.setItem('vlt_vk_exp',String(state.vaultKeyExp));
  localStorage.setItem('vlt_refresh',state.refreshToken);
}
function isVkFresh(){const exp=+localStorage.getItem('vlt_vk_exp')||0;return exp>now()&&localStorage.getItem('vlt_vaultkey');}
function clearSession(){state.vaultKey=state.secretKey=state.accessToken=null;state.accessExp=0;state.refreshToken=null;localStorage.removeItem('vlt_vaultkey');localStorage.removeItem('vlt_vk_exp');localStorage.removeItem('vlt_refresh');}

async function tryAutoUnlock(){
  if(!isVkFresh())return false;
  try{await ensureToken();}catch(e){return false;}
  state.vaultKey=b64d(localStorage.getItem('vlt_vaultkey'));
  const r=await api('/api/auth');
  if(r.data.code!==0)return false;
  state.auth=r.data.auth;
  try{await loadVault();}catch(e){return false;}
  return true;
}

async function doLogin(pw,totp){
  try{
    const pwHash=await sha256hex(pw);
    const r=await api('/api/login',{method:'POST',body:{pwHash,totp}});
    if(r.data.code===4){state.needSetup=true;return{needSetup:true};}
    if(r.data.code!==0)return{err:r.data.msg||'登录失败',lock:r.data.lock,retry_after:r.data.retry_after};
    state.accessToken=r.data.token;state.accessExp=now()+ACCESS_MS;state.refreshToken=r.data.refreshToken;state.totpRequired=r.data.totp_required;
    state.auth=r.data.auth;
    // 防御性检查：auth 必须包含解密所需字段
    if(!state.auth||!state.auth.saltM||!state.auth.wrapNormalByMaster){
      // auth.json 数据不完整：登录密码即 ADMIN_PWD，直接自动修复并重新初始化（不再弹窗死循环）
      const rr=await doRepairBootstrap(pw);
      if(rr.ok){toast('系统已修复（原 vault 密文已保留，可在「设置→导入备份」恢复数据）');return{ok:true};}
      return{err:rr.err||'修复失败，请重试'};
    }
    const kekM=await deriveKey(pw,state.auth.saltM);
    state.vaultKey=await unwrapDEK(kekM,state.auth.wrapNormalByMaster);
    cacheSession();
    await loadVault();
    return{ok:true};
  }catch(e){
    const msg=((e&&e.message)||e)+'';
    // 双保险：即使绕过上面的防御性检查，也能捕获解密崩溃并引导修复
    if(/reading '(replace|split)'/.test(msg)){
      if(confirm('登录数据不完整（解密失败：'+msg+'）。\n\n是否用「管理员密码」修复并重新初始化？')){
        try{return await doRepairBootstrap(pw);}catch(e2){return{err:'修复失败：'+((e2&&e2.message)||e2)};}
      }
      return{err:'登录数据不完整，请尝试修复初始化（或硬刷新页面清除缓存）'};
    }
    return{err:'登录过程出错：'+msg};
  }
}
async function doSetup(pw,secretPw,recoveryPw){
  const loginHash=await sha256hex(pw);
  const saltM=genSalt(),kekM=await deriveKey(pw,saltM);
  const dekN=rnd(32);
  const wrapNormalByMaster=await wrapDEK(kekM,dekN);
  let extra={};
  if(recoveryPw){
    const saltR=genSalt(),kekR=await deriveKey(recoveryPw,saltR);
    extra={saltR,wrapNormalByRecovery:await wrapDEK(kekR,dekN),recoveryHash:await sha256hex(recoveryPw),recoveryId:uid()};
  }
  let saltS=null,wrapSecretBySecret=null;
  if(secretPw){saltS=genSalt();const kekS=await deriveKey(secretPw,saltS);const dekS=rnd(32);wrapSecretBySecret=await wrapDEK(kekS,dekS);}
  const body={loginHash,saltM,wrapNormalByMaster,...extra};
  if(saltS)body.saltS=saltS;if(wrapSecretBySecret)body.wrapSecretBySecret=wrapSecretBySecret;
  const r=await api('/api/bootstrap',{method:'POST',body});
  if(r.data.code!==0)return{err:r.data.msg};
  state.accessToken=r.data.token;state.accessExp=now()+ACCESS_MS;state.refreshToken=r.data.refreshToken;
  state.auth={saltM,...extra};if(saltS)state.auth.saltS=saltS;if(wrapSecretBySecret)state.auth.wrapSecretBySecret=wrapSecretBySecret;
  state.vaultKey=dekN;cacheSession();
  state.data=newVault();
  return{ok:true};
}
/* doForceReset 已移除：重置系统功能不再在登录页暴露（防误触/社工风险）。
   如需紧急清库，可直接在浏览器控制台调用 fetch(API_BASE+'/api/force_reset',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({pwHash:...})})
   或通过 SCF 控制台手动删除 COS 桶内文件。后端 /api/force_reset 端点保留，仍需 ADMIN_PWD 鉴权。 */
async function doRepairBootstrap(loginPw){
  try{
    const loginHash=await sha256hex(loginPw);
    const saltM=genSalt(),kekM=await deriveKey(loginPw,saltM);
    const vaultKey=crypto.getRandomValues(new Uint8Array(32));
    const wrapNormalByMaster=await wrapDEK(kekM,vaultKey);
    let saltR,wrapNormalByRecovery;
    const recoveryPw=prompt('请输入恢复密码（留空则不启用应急恢复）：');
    if(recoveryPw){
      saltR=genSalt();const kekR=await deriveKey(recoveryPw,saltR);
      wrapNormalByRecovery=await wrapDEK(kekR,vaultKey);
    }
    let saltS,wrapSecretBySecret;
    const secretPw=prompt('请输入绝密区密码（留空则不启用绝密区）：');
    if(secretPw){
      saltS=genSalt();const kekS=await deriveKey(secretPw,saltS);
      wrapSecretBySecret=await wrapDEK(kekS,crypto.getRandomValues(new Uint8Array(32)));
    }
    const r=await api('/api/repair_bootstrap',{method:'POST',body:{
      loginHash,saltM,wrapNormalByMaster,
      ...(saltR?{saltR,wrapNormalByRecovery}:{}),
      ...(saltS?{saltS,wrapSecretBySecret}:{})
    }});
    if(r.data.code!==0)return{err:r.data.msg||'修复失败'};
    state.accessToken=r.data.token;state.accessExp=now()+ACCESS_MS;
    state.refreshToken=r.data.refreshToken;
    state.auth={saltM,wrapNormalByMaster,...(saltR?{saltR,wrapNormalByRecovery}:{}),...(saltS?{saltS,wrapSecretBySecret}:{})};
    state.vaultKey=vaultKey;
    cacheSession();
    state.data=newVault();
    if(secretPw)state.secret=newSecret();
    // 只修复 auth.json（覆盖不完整的认证参数），不覆盖 COS 上的 vault 密文，保留用户原有数据以便后续导入备份恢复
    return{ok:true};
  }catch(e){return{err:'修复过程出错：'+((e&&e.message)||e)};}
}

async function unlockSecret(secretPw){
  if(!state.auth||!state.auth.saltS||!state.auth.wrapSecretBySecret)return{err:'未启用绝密区'};
  const kekS=await deriveKey(secretPw,state.auth.saltS);
  try{state.secretKey=await unwrapDEK(kekS,state.auth.wrapSecretBySecret);}
  catch(e){return{err:'绝密密码错误'};}
  await loadSecret();return{ok:true};
}

async function changeMaster(){
  const cur=prompt('输入当前主密码');if(!cur)return;const nh=await sha256hex(cur);
  if(nh!==state.auth.loginHash){toast('当前密码错误',true);return;}
  const np=prompt('输入新主密码');if(!np)return;const cnp=prompt('再次输入新主密码');if(np!==cnp){toast('两次不一致',true);return;}
  const nSalt=genSalt(),kek=await deriveKey(np,nSalt);
  const wrap=await wrapDEK(kek,state.vaultKey);
  const r=await api('/api/auth',{method:'PUT',body:{loginHash:await sha256hex(np),saltM:nSalt,wrapNormalByMaster:wrap}});
  if(r.data.code===0){state.auth.loginHash=await sha256hex(np);state.auth.saltM=nSalt;state.auth.wrapNormalByMaster=wrap;toast('主密码已更新');closeOverlay(document.querySelector('.modal'));}
  else toast('失败：'+(r.data.msg||''),true);
}

  const saltS=genSalt(),kek=await deriveKey(sp,saltS);const dekS=rnd(32);const wrap=await wrapDEK(kek,dekS);
  const r=await api('/api/auth',{method:'PUT',body:{saltS,wrapSecretBySecret:wrap}});
  if(r.data.code===0){state.auth.saltS=saltS;state.auth.wrapSecretBySecret=wrap;toast('绝密区已启用');closeOverlay(document.querySelector('.modal'));}
  else toast('失败',true);
}
async function doWipe(){
  if(!confirm('将清空全部数据（普通区/绝密区/登录凭据/图片/分享），不可恢复！\n建议先导出备份。'))return;
  const c=confirm('最后确认：在下方输入框输入 DELETE（区分大小写）才能执行。');if(!c)return;
  const v=prompt('请输入 DELETE：');if(v!=='DELETE'){toast('未输入 DELETE，已取消',true);return;}
  const r=await api('/api/reset',{method:'POST',body:{confirm:'DELETE'}});
  if(r.data.code===0){toast('系统已重置');clearSession();location.reload();}else toast('失败：'+(r.data.msg||''),true);
}
function statsHTML(){return `<div class="box"><h3>📊 统计面板</h3><div id="statsBody">加载中…</div><div class="foot"><button class="btn ghost" id="close">关闭</button></div></div>`;}
async function bindStats(m){
  // 先绑关闭按钮：确保无论后续是否出错都能关掉
  $('#close').onclick=()=>closeOverlay(m);
  try{
    const d=curData();const entries=d.entries||[];
    const views=(d.logs||[]).filter(l=>l.action==='view').length;
    const copies=(d.logs||[]).filter(l=>l.action==='copy').length;
    let loginLog=[];
    try{const lr=await api('/api/logs');loginLog=lr.data.loginLog||[];}catch(e){/* 服务端日志取不到时跳过 */}
    let html=`<div class="statgrid">
      <div class="stat"><div class="n">${entries.length}</div><div class="l">当前条目</div></div>
      <div class="stat"><div class="n">${(state.data.categories||[]).length}</div><div class="l">分类数</div></div>
      <div class="stat"><div class="n">${state.view==='secret'?'—':(state.data.trash||[]).length}</div><div class="l">回收站</div></div>
      <div class="stat"><div class="n">${views}</div><div class="l">查看次数</div></div>
      <div class="stat"><div class="n">${copies}</div><div class="l">复制次数</div></div>
      <div class="stat"><div class="n">${loginLog.length}</div><div class="l">登录记录</div></div></div>`;
    html+='<h4>最近活跃</h4>';
    const recent=(d.logs||[]).slice(-12).reverse();
    html+=recent.length?recent.map(l=>`<div class="logline"><span class="t">${fmtDate(l.ts)}</span><span>${esc(l.action)} ${esc(l.detail||'')}</span></div>`).join(''):'<div class="hint">暂无</div>';
    html+='<h4>登录 IP 记录</h4>';
    html+=loginLog.length?loginLog.slice(-12).reverse().map(l=>`<div class="logline"><span class="t">${fmtDate(l.ts*1000)}</span><span>${esc(l.ip)}</span></div>`).join(''):'<div class="hint">暂无</div>';
    $('#statsBody').innerHTML=html;
  }catch(e){
    $('#statsBody').innerHTML='<div class="hint" style="color:var(--danger)">加载失败</div>';
  }
}
function shareHTML(){return `<div class="box"><h3>🔗 只读分享</h3>
  <div class="field"><label>选择要分享的条目</label><select id="s_entry"></select></div>
  <div class="field"><label>有效期（小时，0=不限）</label><input id="s_exp" type="number" value="24" min="0"></div>
  <div class="field"><button class="btn" id="s_make">生成分享链接</button></div>
  <div id="s_out" class="hidden"><div class="field"><label>分享链接（密钥在 # 片段，仅持有链接者可读）</label><input id="s_link" readonly><button class="btn sm" id="s_copy">复制</button></div></div>
  <div class="foot"><button class="btn ghost" id="close">关闭</button></div></div>`;}
async function bindShare(m){
  $('#close').onclick=()=>closeOverlay(m);
  try{
    const entries=curData().entries||[];
    $('#s_entry').innerHTML=entries.map(e=>`<option value="${e.id}">${esc(e.label||'(无标题)')}</option>`).join('')||'<option>无条目</option>';
    $('#s_make').onclick=async()=>{
      const e=entries.find(x=>x.id===$('#s_entry').value);if(!e)return;
      const shareDEK=rnd(32);
      const cipher=await encryptJSON(shareDEK,e);
      const exp=+$('#s_exp').value||0;const expiresAt=exp?now()+exp*3600000:0;
      const r=await api('/api/share',{method:'POST',body:{entryId:e.id,cipher,expiresAt}});
      if(r.data.code===0){const link=location.origin+location.pathname+'#/share/'+r.data.id+'/'+b64u(shareDEK);
        $('#s_link').value=link;$('#s_out').classList.remove('hidden');toast('分享已生成');}
      else toast('失败',true);
    };
    $('#s_copy').onclick=()=>copyText($('#s_link').value);
  }catch(e){/* 面板仍可关闭 */}
}
function recoverHTML(){return `<div class="box"><h3>🛟 应急恢复（数字遗产）</h3>
  <div class="field"><label>设置恢复密码 R（拆分给多人保管，拼齐可解锁普通区）</label><button class="btn sm" id="r_set">设置/更新 R</button></div>
  <div class="field"><label>公开恢复链接（无限期有效，R 是唯一门槛）</label><div id="r_linkbox" class="hidden"><input id="r_link" readonly><button class="btn sm" id="r_copy">复制</button></div><div id="r_linktip" class="hint">尚未设置 R。</div></div>
  <div class="foot"><button class="btn ghost" id="close">关闭</button></div></div>`;}
async function bindRecover(m){
  $('#close').onclick=()=>closeOverlay(m);
  try{
    if(state.auth&&state.auth.recoveryId){$('#r_link').value=location.origin+location.pathname+'#/recover/'+state.auth.recoveryId;$('#r_linkbox').classList.remove('hidden');$('#r_linktip').classList.add('hidden');}
    $('#r_set').onclick=async()=>{
      const R=prompt('设置恢复密码 R（建议足够长，随后拆分给不同人）');if(!R)return;const cR=prompt('再次输入 R');if(R!==cR){toast('两次不一致',true);return;}
      const saltR=genSalt(),kekR=await deriveKey(R,saltR);const wrap=await wrapDEK(kekR,state.vaultKey);
      const r=await api('/api/auth',{method:'PUT',body:{saltR,wrapNormalByRecovery:wrap,recoveryHash:await sha256hex(R),recoveryId:state.auth.recoveryId||uid()}});
      if(r.data.code===0){state.auth.saltR=saltR;state.auth.wrapNormalByRecovery=wrap;state.auth.recoveryHash=await sha256hex(R);state.auth.recoveryId=state.auth.recoveryId||uid();
        $('#r_link').value=location.origin+location.pathname+'#/recover/'+state.auth.recoveryId;$('#r_linkbox').classList.remove('hidden');$('#r_linktip').classList.add('hidden');toast('恢复密码已设置');}
      else toast('失败',true);
    };
    $('#r_copy').onclick=()=>copyText($('#r_link').value);
  }catch(e){/* 面板仍可关闭 */}
}

/* ============== 覆盖层 / 复制 / 二维码 ============== */
function overlay(html,cb){const d=document.createElement('div');d.className='modal';d.innerHTML=html;document.body.appendChild(d);if(cb)cb(d);return d;}
function closeOverlay(d){d.remove();}
function showQR(text){const m=overlay(`<div class="box"><h3>二维码</h3><div class="qrbox" id="qrc"></div><div class="hint" style="margin-top:8px;word-break:break-all">${esc(text)}</div><div class="foot"><button class="btn ghost" id="c">关闭</button></div></div>`);new QRCode($('#qrc'),{text,width:220,height:220});$('#c').onclick=()=>closeOverlay(m);}
async function copyText(text){if(!text)return;try{await navigator.clipboard.writeText(text);}catch(e){const t=document.createElement('textarea');t.value=text;document.body.appendChild(t);t.select();document.execCommand('copy');t.remove();}
  toast('已复制');logAction('copy');const sec=state.data.settings?.clipboardClear||0;if(sec>0)setTimeout(()=>{try{navigator.clipboard.writeText('');}catch(e){}},sec*1000);}

/* ============== 登录门 ============== */
async function doLgo(){
    const pw=$('#lp').value;if(!pw)return;
    if(state.needSetup){if(pw!==$('#lp2').value){toast('两次密码不一致',true);return;}const r=await doSetup(pw,$('#lsp').value,$('#lrp').value);if(r.ok){enterApp();}else toast(r.err||'失败',true);}
    else{const r=await doLogin(pw,$('#lt')?.value||'');if(r.ok)enterApp();else if(r.needSetup){state.needSetup=true;showLogin();}else{showLogin(r.err);}}
}
function showLogin(err){
  const g=$('#gate');g.className='lockwrap';
  g.innerHTML=`<div class="lockcard"><div class="big">🔐</div><h2>工程账本</h2>
    ${state.needSetup?'<p style="color:var(--muted)">首次使用，设置主密码</p>':'<p style="color:var(--muted)">输入主密码解锁</p>'}
    ${err?`<p style="color:var(--danger)">${esc(err)}</p>`:''}
    <div class="field"><input id="lp" type="password" placeholder="主密码"></div>
    ${state.totpRequired?'<div class="field"><input id="lt" placeholder="动态码（可选）"></div>':''}
    ${state.needSetup?`<div class="field"><input id="lp2" type="password" placeholder="确认主密码"></div>
      <div class="field"><input id="lsp" type="password" placeholder="绝密区密码（可选，留空不启用）"></div>
      <div class="field"><input id="lrp" type="password" placeholder="应急恢复密码 R（可选）"></div>`:''}
    <button class="btn" id="lgo" style="width:100%">${state.needSetup?'初始化':'解锁'}</button>
    ${err&&err.lock?'<p style="color:var(--warn);margin-top:10px">已被锁定，请稍后再试</p>':''}
  </div>`;
  $('#lgo').onclick=doLgo;
  // 回车键触发解锁/初始化
  const lpEl=$('#lp'); if(lpEl)lpEl.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();doLgo();}});
  const lp2El=$('#lp2'); if(lp2El)lp2El.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();doLgo();}});
}
function openSecretGate(){
  const enabled=!!(state.auth&&state.auth.saltS&&state.auth.wrapSecretBySecret);
  if(!enabled){
    // 绝密区尚未启用（如修复初始化时留空）——提供首次设置入口
    const m=overlay(`<div class="box"><h3>🔒 启用绝密区</h3><p style="color:var(--muted);font-size:13px;margin:0 0 10px">绝密区尚未设置密码。请设置一个绝密区密码来启用（<b>忘记无法恢复</b>，与主密码相互独立）。</p><div class="field"><input id="sp" type="password" placeholder="设置绝密区密码"></div><div class="field"><input id="sp2" type="password" placeholder="再次输入绝密区密码"></div><div class="foot"><button class="btn ghost" id="c">取消</button><button class="btn" id="ok">启用</button></div></div>`);
    const doEnable=async()=>{
      const sp=$('#sp').value,sp2=$('#sp2').value;
      if(!sp){toast('请输入绝密区密码',true);return;}
      if(sp!==sp2){toast('两次输入不一致',true);return;}
      try{
        const saltS=genSalt(),kek=await deriveKey(sp,saltS);const dekS=rnd(32);const wrap=await wrapDEK(kek,dekS);
        const r=await api('/api/auth',{method:'PUT',body:{saltS,wrapSecretBySecret:wrap}});
        if(r.data.code!==0){toast('启用失败：'+(r.data.msg||''),true);return;}
        state.auth.saltS=saltS;state.auth.wrapSecretBySecret=wrap;state.secretKey=dekS;
        closeOverlay(m);render();toast('绝密区已启用并解锁');
      }catch(e){toast('启用出错：'+((e&&e.message)||e),true);}
    };
    $('#ok').onclick=doEnable;
    $('#c').onclick=()=>closeOverlay(m);
    $('#sp').onkeydown=e=>{if(e.key==='Enter'){e.preventDefault();$('#sp2').focus();}};
    $('#sp2').onkeydown=e=>{if(e.key==='Enter'){e.preventDefault();doEnable();}};
    setTimeout(()=>$('#sp')&&$('#sp').focus(),50);
    return;
  }
  const m=overlay(`<div class="box"><h3>🔒 绝密区验证</h3><div class="field"><input id="sp" type="password" placeholder="绝密区密码"></div><div class="foot"><button class="btn ghost" id="c">取消</button><button class="btn" id="ok">解锁</button></div></div>`);
  const doUnlock=async()=>{try{const r=await unlockSecret($('#sp').value);if(r.ok){closeOverlay(m);render();toast('绝密区已解锁');}else toast(r.err||'失败',true);}catch(e){toast('绝密区解锁出错：'+((e&&e.message)||e),true);}};
  $('#ok').onclick=doUnlock;
  $('#c').onclick=()=>closeOverlay(m);
  $('#sp').onkeydown=e=>{if(e.key==='Enter'){e.preventDefault();doUnlock();}};
  setTimeout(()=>$('#sp')&&$('#sp').focus(),50);
}
function enterApp(){$('#gate').className='hidden';$('#gate').innerHTML='';$('#app').classList.remove('hidden');applyTheme(localStorage.getItem('vlt_theme')||state.data.settings?.theme||'light');render();toast('已解锁');}
function applyTheme(t){document.documentElement.setAttribute('data-theme',t);localStorage.setItem('vlt_theme',t);}

/* ============== 分享/恢复 独立页（URL hash） ============== */
async function handleHashRoute(){
  const h=location.hash;
  if(h.startsWith('#/share/')){const id=h.slice(8);await showSharePage(id);return true;}
  if(h.startsWith('#/recover/')){const id=h.slice(9);await showRecoverPage(id);return true;}
  return false;
}
async function showSharePage(route){
  const [sid,keyB64]=route.split('/');
  document.getElementById('app').classList.add('hidden');
  const g=$('#gate');g.className='lockwrap';
  g.innerHTML=`<div class="lockcard"><div class="big">🔗</div><h2>只读分享</h2><div id="sb">读取中…</div></div>`;
  if(!keyB64){g.querySelector('#sb').innerHTML='<p style="color:var(--danger)">链接缺少密钥片段，无法解密</p>';return;}
  const r=await api('/api/share/'+encodeURIComponent(sid));
  if(r.status!==200||r.data.code!==0){g.querySelector('#sb').innerHTML='<p style="color:var(--danger)">'+(r.data.msg||'读取失败')+'</p>';return;}
  let obj;try{obj=await decryptJSON(b64d(keyB64),r.data.cipher);}catch(e){g.querySelector('#sb').innerHTML='<p style="color:var(--danger)">解密失败（密钥不匹配）</p>';return;}
  const users=(obj.users||[]).map(u=>`<div class="user"><span class="un">${esc(u.note||u.username||'')}</span><span class="pw">${esc(u.username||'')}</span><span class="pw">${esc(u.password||'')}</span></div>`).join('');
  g.querySelector('#sb').innerHTML=`<div style="text-align:left"><h3 style="margin:0 0 8px">${esc(obj.label||'(无标题)')}</h3>
    ${obj.url?`<div class="note"><a href="${esc(obj.url)}" target="_blank" rel="noopener">${esc(obj.url)}</a></div>`:''}
    ${obj.note?`<div class="note">${esc(obj.note)}</div>`:''}
    ${users?`<div class="users">${users}</div>`:''}
    ${obj.qrText?`<div class="hint" style="margin-top:8px;word-break:break-all">${esc(obj.qrText)}</div>`:''}
    <p class="hint" style="margin-top:14px">此页为只读分享，不含你的主密码。</p></div>`;
}
async function showRecoverPage(id){
  document.getElementById('app').classList.add('hidden');
  const g=$('#gate');g.className='lockwrap';
  g.innerHTML=`<div class="lockcard"><div class="big">🛟</div><h2>应急恢复</h2><p style="color:var(--muted)">输入恢复密码 R 解锁普通区</p><div class="field"><input id="rr" type="password" placeholder="恢复密码 R"></div><button class="btn" id="rgo">解锁并设新主密码</button><div id="rstep2" class="hidden"><hr><p>设置新主密码（将展示资产，绝密区仍锁死）</p><div class="field"><input id="rn1" type="password" placeholder="新主密码"></div><div class="field"><input id="rn2" type="password" placeholder="确认新主密码"></div><button class="btn" id="rset">完成恢复</button></div></div>`;
  $('#rgo').onclick=async()=>{
    const R=$('#rr').value;if(!R)return;
    const v=await api('/api/recover/verify',{method:'POST',body:{recoveryId:id,R:await sha256hex(R)}});
    if(v.data.code!==0){toast(v.data.msg||'失败',true);return;}
    const kekR=await deriveKey(R,v.data.saltR);let dekN;try{dekN=await unwrapDEK(kekR,v.data.wrapNormalByRecovery);}catch(e){toast('恢复密码错误',true);return;}
    state.vaultKey=dekN;$('#rstep2').classList.remove('hidden');
    $('#rset').onclick=async()=>{
      const a=$('#rn1').value,b=$('#rn2').value;if(a!==b){toast('两次不一致',true);return;}
      const saltM=genSalt(),kekM=await deriveKey(a,saltM);const wrap=await wrapDEK(kekM,dekN);
      const s=await api('/api/recover/setnew',{method:'POST',body:{recoveryId:id,R:await sha256hex(R),loginHash:await sha256hex(a),saltM,wrapNormalByMaster:wrap}});
      if(s.data.code===0){g.innerHTML='<div class="lockcard"><div class="big">✅</div><h2>恢复完成</h2><p>新主密码已设置。请用新主密码登录查看资产。</p></div>';}
      else toast('失败',true);
    };
  };
}

/* ============== 启动 ============== */
(async function start(){
  if(await handleHashRoute())return;
  // 先探测初始化状态
  try{const h=await api('/api/health');if(h.data){state.needSetup=(h.data.initialized===false);state.totpRequired=h.data.totp;}}catch(e){}
  const au=document.createElement('div');au.className='autounlock';au.textContent='正在自动解锁…';
  const ok=await tryAutoUnlock();
  if(ok){enterApp();return;}
  showLogin();
})();
</script>
