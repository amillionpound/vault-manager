<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#4f6ef7" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="账本" />
<link rel="manifest" href="./manifest.webmanifest" />
<link rel="apple-touch-icon" href="./icons/icon-192.png" />
<title>工程账本 · 链接/密码管理</title>
<style>
  :root{--bg:#f4f6fb;--panel:#fff;--ink:#1f2733;--muted:#6b7785;--line:#e6eaf0;
    --brand:#4f6ef7;--ok:#1faa6b;--danger:#e5484d;--warn:#e8912d;--chip:#eef1f8;--shadow:0 6px 24px rgba(31,39,51,.08)}
  body.dark{--bg:#15181f;--panel:#1f242e;--ink:#e8ecf2;--muted:#9aa6b5;--line:#2c3340;--chip:#262d39;--shadow:0 6px 24px rgba(0,0,0,.4)}
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
    background:var(--bg);color:var(--ink);line-height:1.5}
  button{font-family:inherit;cursor:pointer;border:none;border-radius:10px;padding:9px 14px;font-size:14px;font-weight:600}
  input,textarea,select{font-family:inherit;font-size:14px;padding:9px 11px;border:1px solid var(--line);border-radius:9px;background:var(--panel);color:var(--ink);width:100%}
  input:focus,textarea:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px rgba(79,110,247,.15)}
  .btn-p{background:var(--brand);color:#fff}.btn-s{background:var(--chip);color:var(--ink)}
  .btn-d{background:transparent;color:var(--danger);border:1px solid var(--line)}
  .btn-g{background:var(--ok);color:#fff}.hidden{display:none!important}
  .bar{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .wrap{max-width:1100px;margin:0 auto;padding:16px}
  .head{position:sticky;top:0;z-index:5;background:var(--panel);border-bottom:1px solid var(--line);padding:12px 0}
  .head .wrap{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .title{font-size:18px;font-weight:800;margin:0}
  .sub{color:var(--muted);font-size:12px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:14px;margin-top:16px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px;box-shadow:var(--shadow)}
  .card h3{margin:0 0 2px;font-size:16px;display:flex;align-items:center;gap:8px}
  .badge{font-size:11px;font-weight:700;color:var(--brand);background:var(--chip);border-radius:999px;padding:2px 9px}
  .desc{color:var(--muted);font-size:13px;margin:6px 0 10px}
  .link{border-top:1px dashed var(--line);padding:10px 0}
  .link:first-of-type{border-top:none}
  .link-name{font-weight:700;font-size:14px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .url{font-size:12px;color:var(--brand);word-break:break-all;margin:3px 0}
  .up{display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding:4px 0;font-size:13px}
  .note{font-weight:600}.uname{color:var(--muted)}
  .pw{font-family:ui-monospace,Menlo,Consolas,monospace;background:var(--chip);padding:2px 8px;border-radius:6px;letter-spacing:1px}
  .mini{padding:4px 9px;font-size:12px;border-radius:8px}
  .row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:8px}
  .modal-bg{position:fixed;inset:0;background:rgba(20,24,33,.45);display:flex;align-items:center;justify-content:center;padding:16px;z-index:20}
  .modal{background:var(--panel);border-radius:16px;padding:18px;width:100%;max-width:480px;box-shadow:var(--shadow);max-height:90vh;overflow:auto}
  .modal h3{margin:0 0 12px}
  .field{margin-bottom:11px}.field label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px}
  .lock{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#4f6ef7,#7b5bff)}
  .lock .card{width:100%;max-width:360px}
  .toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%);background:#222c3a;color:#fff;padding:10px 16px;border-radius:10px;font-size:14px;z-index:50;opacity:0;transition:.25s;pointer-events:none}
  .toast.show{opacity:1}.toast.err{background:var(--danger)}.toast.ok{background:var(--ok)}
  .muted{color:var(--muted)}.sm{font-size:12px}.mt8{margin-top:8px}.mt12{margin-top:12px}
  .hash-out{word-break:break-all;background:var(--chip);padding:10px;border-radius:8px;font-family:ui-monospace,monospace;font-size:13px}
  .stat{font-size:12px;color:var(--muted)}
</style>
</head>
<body>

<!-- 登录 -->
<div id="login" class="lock">
  <div class="card">
    <div style="font-size:38px;text-align:center;margin-bottom:6px">🔐</div>
    <h3 style="text-align:center;margin:0 0 4px">工程账本</h3>
    <div class="sub tc" style="text-align:center;margin-bottom:16px">输入管理员密码解锁</div>
    <div class="field"><label>密码</label><input id="pw" type="password" placeholder="管理员密码" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <div id="totpBox" class="field hidden"><label>动态码 (TOTP)</label><input id="totp" inputmode="numeric" maxlength="6" placeholder="6 位动态码"></div>
    <button class="btn-p" style="width:100%" onclick="doLogin()">解锁</button>
    <div id="loginErr" class="sub err" style="color:var(--danger);text-align:center;margin-top:10px"></div>
    <div class="sub tc" style="margin-top:12px"><a href="#" onclick="openSettings();return false">⚙ 设置 SCF API 地址</a></div>
  </div>
</div>

<!-- 主界面 -->
<div id="app" class="hidden">
  <div class="head"><div class="wrap">
    <div><div class="title">工程账本</div><div class="sub" id="stat"></div></div>
    <div style="flex:1"></div>
    <input id="search" placeholder="搜索工程/链接/账号…" style="max-width:240px" oninput="render()">
    <button class="btn-s" onclick="openSelf()">🧮 自算密钥</button>
    <button class="btn-s" onclick="exportBackup()">⬇ 导出</button>
    <button class="btn-s" onclick="importBackup()">⬆ 导入</button>
    <button class="btn-s" id="darkBtn" onclick="toggleDark()">🌙</button>
    <button class="btn-s" onclick="openSettings()">⚙</button>
    <button class="btn-s" onclick="openTrash()">🗑 回收站</button>
    <button class="btn-s" onclick="openLog()">📜 日志</button>
    <button class="btn-p" onclick="openProject()">＋ 工程</button>
    <button class="btn-d" onclick="logout()">退出</button>
  </div></div>
  <div class="wrap">
    <div id="grid" class="grid"></div>
  </div>
</div>

<!-- 通用弹窗 -->
<div id="modalBg" class="modal-bg hidden" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal"></div>
</div>
<div id="toast" class="toast"></div>

<script src="/static/jsqr.js"></script>
<script src="/static/qrcode.min.js"></script>
<script>
// ============================ 基础工具 ============================
const $ = (id)=>document.getElementById(id);
let TOKEN=null, LOGIN_PWD=null, VKEY=null, VAULT=null, META=null, PW={}, URL={};
const b64=(u)=>btoa(String.fromCharCode(...new Uint8Array(u)));
const unb64=(s)=>new Uint8Array(atob(s).split('').map(c=>c.charCodeAt(0)));
async function sha256hex(s){const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(s));return [...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,'0')).join('');}
function genId(){return Math.random().toString(36).slice(2,10)+Date.now().toString(36).slice(-4);}
function now(){return Math.floor(Date.now()/1000);}
function toast(m,t){const e=$('toast');e.textContent=m;e.className='toast show '+(t||'');setTimeout(()=>e.className='toast',1800);}
const API_BASE=(localStorage.getItem('vlt_api_base')||'https://1256784020-5x5qs04wi9.ap-guangzhou.tencentscf.com').replace(/\/+$/,'');
function full(path){return (API_BASE&&path.startsWith('/'))?API_BASE+path:path;}
async function api(path,opts={}){
  const r=await fetch(full(path),{...opts,headers:{'Content-Type':'application/json',...(TOKEN?{Authorization:'Bearer '+TOKEN}:{}),...(opts.headers||{})}});
  return r.json();
}
function openModal(html){$('modal').innerHTML=html;$('modalBg').classList.remove('hidden');}
function closeModal(){$('modalBg').classList.add('hidden');}
function openSettings(){
  const cur=localStorage.getItem('vlt_api_base')||'https://1256784020-5x5qs04wi9.ap-guangzhou.tencentscf.com';
  openModal(`<h3>设置 SCF API 地址</h3>
    <div class="sub">前端托管在 CloudStudio / GitHub Pages（与 SCF 不同源），需填写 SCF（API 服务）的访问地址，例如：<br><code>https://vlt-mgr-xxxx.apigw.tencentcs.com/release</code></div>
    <div class="field"><label>SCF API 地址</label><input id="f_api" value="${esc(cur)}" placeholder="https://xxx.ap-guangzhou.tencentscf.com"></div>
    <div class="bar"><button class="btn-p" onclick="saveSettings()">保存</button><button class="btn-s" onclick="closeModal()">取消</button></div>`);
}
function saveSettings(){
  const v=$('f_api').value.trim().replace(/\/+$/,'');
  if(v)localStorage.setItem('vlt_api_base',v);else localStorage.removeItem('vlt_api_base');
  location.reload();
}
function copy(t){navigator.clipboard.writeText(t).then(()=>toast('已复制','ok'),()=>toast(t,''));}

// ============================ 客户端加解密（模型 A） ============================
async function deriveKey(pwd,saltBuf,iter){
  const base=await crypto.subtle.importKey('raw',new TextEncoder().encode(pwd),'PBKDF2',false,['deriveKey']);
  return crypto.subtle.deriveKey({name:'PBKDF2',salt:saltBuf,iterations:iter,hash:'SHA-256'},base,{name:'AES-GCM',length:256},false,['encrypt','decrypt']);
}
async function enc(key,s){const iv=crypto.getRandomValues(new Uint8Array(12));const ct=await crypto.subtle.encrypt({name:'AES-GCM',iv},key,new TextEncoder().encode(s));return {iv:b64(iv),ct:b64(new Uint8Array(ct))};}
async function dec(key,b){const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:unb64(b.iv)},key,unb64(b.ct));return new TextDecoder().decode(pt);}
async function decBytes(key,b){const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:unb64(b.iv)},key,unb64(b.ct));return pt;}
async function encBytes(key,buf){const iv=crypto.getRandomValues(new Uint8Array(12));const ct=await crypto.subtle.encrypt({name:'AES-GCM',iv},key,buf);return {iv:b64(iv),ct:b64(new Uint8Array(ct))};}
async function saveVault(){
  const blob=await enc(VKEY,JSON.stringify(VAULT));
  const cipher=b64(JSON.stringify(blob));
  const meta={salt:META.salt,iterations:META.iterations,verifier:META.verifier};
  const r=await api('/api/vault',{method:'PUT',body:JSON.stringify({cipher,meta})});
  return r.code===0;
}
function log(action,target){VAULT.log.unshift({ts:now(),action,target});if(VAULT.log.length>500)VAULT.log.length=500;}

// ============================ 登录 / 解锁 ============================
async function doLogin(){
  const pwd=$('pw').value;
  if(!API_BASE){toast('请先点下方⚙设置 SCF API 地址','err');openSettings();return;}
  if(!pwd){toast('请输入密码','err');return;}
  const pwHash=await sha256hex(pwd);
  const r=await api('/api/login',{method:'POST',body:JSON.stringify({pwHash,totp:$('totp').value})});
  if(r.code===0){TOKEN=r.token;LOGIN_PWD=pwd;if(r.totp_required)$('totpBox').classList.remove('hidden');await unlock();}
  else if(r.code===2){$('totpBox').classList.remove('hidden');$('loginErr').textContent=r.msg;}
  else {$('loginErr').textContent=r.msg;}
}
async function unlock(){
  const mr=await api('/api/meta');
  let saltBuf,iter,verifier;
  if(!mr.meta){
    saltBuf=crypto.getRandomValues(new Uint8Array(16));iter=150000;
    VKEY=await deriveKey(LOGIN_PWD,saltBuf,iter);
    verifier=await enc(VKEY,'VAULT_OK');
    META={salt:b64(saltBuf),iterations:iter,verifier};
    VAULT={version:1,projects:[],log:[],trash:[]};
    await saveVault();
  }else{
    META=mr.meta;saltBuf=unb64(mr.meta.salt);iter=mr.meta.iterations;
    VKEY=await deriveKey(LOGIN_PWD,saltBuf,iter);
    try{const ok=await dec(VKEY,mr.meta.verifier);if(ok!=='VAULT_OK')throw 0;}
    catch(e){toast('密码错误','err');return;}
    const vr=await api('/api/vault');
    if(!vr.cipher){VAULT={version:1,projects:[],log:[],trash:[]};}
    else{const blob=JSON.parse(atob(vr.cipher));VAULT=JSON.parse(await dec(VKEY,blob));}
  }
  $('login').classList.add('hidden');$('app').classList.remove('hidden');
  render();
}
function logout(){TOKEN=null;LOGIN_PWD=null;VKEY=null;VAULT=null;META=null;$('app').classList.add('hidden');$('login').classList.remove('hidden');$('pw').value='';$('totp').value='';}

// ============================ 渲染 ============================
function esc(s){return (s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function render(){
  const q=($('search').value||'').toLowerCase();
  let ps=(VAULT.projects||[]).filter(p=>{
    if(!q)return true;
    if((p.name+p.category+p.description).toLowerCase().includes(q))return true;
    return (p.links||[]).some(l=>(l.label+l.url).toLowerCase().includes(q)||(l.users||[]).some(u=>(u.note+u.username).toLowerCase().includes(q)));
  });
  const totalLinks=VAULT.projects.reduce((a,p)=>a+(p.links||[]).length,0);
  const totalUsers=VAULT.projects.reduce((a,p)=>a+(p.links||[]).reduce((b,l)=>b+(l.users||[]).length,0),0);
  $('stat').textContent=`${VAULT.projects.length} 个工程 · ${totalLinks} 条链接 · ${totalUsers} 个账号`;
  const grid=$('grid');grid.innerHTML='';
  if(!ps.length){grid.innerHTML='<div class="muted">暂无匹配。点右上角「＋ 工程」添加。</div>';return;}
  for(const p of ps){
    const linksHtml=(p.links||[]).map(l=>{
      const usersHtml=(l.users||[]).map(u=>{
        PW[u.id]=u.password;URL[l.id]=l.url;
        const id='pw_'+u.id;
        return `<div class="up">
          <span class="note">${esc(u.note||'账号')}</span>
          ${u.username?`<span class="uname">(${esc(u.username)})</span>`:''}
          <span class="pw" id="${id}">••••••••</span>
          <button class="btn-s mini" onclick="revealPw('${u.id}','${id}')">👁</button>
          <button class="btn-s mini" onclick="copyPW('${u.id}')">复制</button>
          <button class="btn-d mini" onclick="delUser('${p.id}','${l.id}','${u.id}')">🗑</button>
        </div>`;
      }).join('');
      const kindEmoji={link:'🔗',secret:'🔑',note:'📝'}[l.kind]||'🔗';
      const imgsHtml=(l.images||[]).map(im=>`<button class="btn-s mini" onclick="viewImage('${p.id}','${l.id}','${im.id}')">🖼 ${esc(im.name||'图片')}</button>`).join('');
      return `<div class="link">
        <div class="link-name">${kindEmoji} ${esc(l.label||'链接')}
          ${l.url?`<button class="btn-s mini" onclick="copyURL('${l.id}')">复制链接</button>
          <button class="btn-s mini" onclick="showQR('${p.id}','${l.id}')">📱 二维码</button>`:''}
          <button class="btn-s mini" onclick="openUser('${p.id}','${l.id}')">＋账号</button>
          <button class="btn-s mini" onclick="openLink('${p.id}','${l.id}')">✎</button>
          <button class="btn-d mini" onclick="delLink('${p.id}','${l.id}')">🗑</button>
        </div>
        <div class="url">${l.url?esc(l.url):'<span class="muted sm">（无链接）</span>'}</div>
        ${usersHtml||'<div class="muted sm">无账号</div>'}
        ${imgsHtml?`<div class="row">${imgsHtml}</div>`:''}
      </div>`;
    }).join('');
    const card=document.createElement('div');card.className='card';
    card.innerHTML=`<h3>${p.icon||'📁'} ${esc(p.name)} ${p.category?`<span class="badge">${esc(p.category)}</span>`:''}</h3>
      <div class="desc">${esc(p.description||'')}</div>
      ${linksHtml}
      <div class="row">
        <button class="btn-s mini" onclick="openLink('${p.id}',null)">＋链接</button>
        <button class="btn-s mini" onclick="openProject('${p.id}')">✎ 编辑</button>
        <button class="btn-d mini" onclick="delProject('${p.id}')">移至回收站</button>
      </div>`;
    grid.appendChild(card);
  }
}
function revealPw(uid,eid){const e=$(eid);if(e.textContent==='••••••••'){e.textContent=PW[uid];}else{e.textContent='••••••••';}}
function copyPW(uid){copy(PW[uid]);log('copy',uid);}
function copyURL(lid){copy(URL[lid]);}
function openURL(lid){const u=URL[lid];if(u)window.open(u,'_blank');}

// ============================ CRUD：工程 ============================
function getProject(id){return VAULT.projects.find(p=>p.id===id);}
function openProject(id){
  const p=id?getProject(id):null;
  openModal(`<h3>${id?'编辑工程':'新建工程'}</h3>
    <div class="field"><label>名称</label><input id="f_name" value="${esc(p?p.name:'')}"></div>
    <div class="field"><label>图标 (emoji)</label><input id="f_icon" value="${esc(p?p.icon:'📁')}" maxlength="4"></div>
    <div class="field"><label>分类</label><input id="f_cat" value="${esc(p?p.category:'')}" placeholder="如 知识库 / 学习工具"></div>
    <div class="field"><label>简介</label><textarea id="f_desc" rows="3">${esc(p?p.description:'')}</textarea></div>
    <div class="bar"><button class="btn-p" onclick="saveProject('${id||''}')">保存</button><button class="btn-s" onclick="closeModal()">取消</button></div>`);
}
async function saveProject(id){
  const name=$('f_name').value.trim();if(!name){toast('请填名称','err');return;}
  if(id){const p=getProject(id);p.name=name;p.icon=$('f_icon').value||'📁';p.category=$('f_cat').value.trim();p.description=$('f_desc').value.trim();p.updatedAt=now();}
  else{VAULT.projects.unshift({id:genId(),name,icon:$('f_icon').value||'📁',category:$('f_cat').value.trim(),description:$('f_desc').value.trim(),createdAt:now(),updatedAt:now(),links:[]});}
  log('edit',name);await saveVault();closeModal();render();toast('已保存','ok');
}
async function delProject(id){
  const p=getProject(id);
  const allImgs=[];(p.links||[]).forEach(l=>(l.images||[]).forEach(im=>allImgs.push(im)));
  if(allImgs.length)await cleanupImages(allImgs);
  VAULT.trash.unshift({deletedAt:now(),project:p});VAULT.projects=VAULT.projects.filter(x=>x.id!==id);
  await saveVault();render();toast('已移至回收站','ok');
}

// ============================ CRUD：链接 ============================
function getLink(pid,lid){const p=getProject(pid);return p?(p.links||[]).find(l=>l.id===lid):null;}
function openLink(pid,lid){
  const l=lid?getLink(pid,lid):null;
  const kind=l?l.kind:'link';
  const imgs=(l&&l.images)||[];
  const imgHtml=imgs.map(im=>`<div class="up"><span class="note">${esc(im.name||'图片')}</span>
     <button class="btn-s mini" onclick="viewImage('${pid}','${lid}','${im.id}')">查看</button>
     <button class="btn-d mini" onclick="delImage('${pid}','${lid}','${im.id}')">🗑</button></div>`).join('');
  openModal(`<h3>${lid?'编辑链接':'新建链接'}</h3>
    <div class="field"><label>类型</label>
      <select id="f_kind">
        <option value="link"${kind==='link'?' selected':''}>🔗 链接（有网址，可扫二维码/生成二维码）</option>
        <option value="secret"${kind==='secret'?' selected':''}>🔑 凭据（账号+密码，无网址）</option>
        <option value="note"${kind==='note'?' selected':''}>📝 笔记</option>
      </select></div>
    <div class="field"><label>名称 / 角色</label><input id="f_label" value="${esc(l?l.label:'')}" placeholder="如 超管登录 / 统计页面 / 银行卡"></div>
    <div class="field"><label>URL（网址 / 二维码内容，可为空）</label>
      <div class="bar"><input id="f_url" value="${esc(l?l.url:'')}"><button class="btn-s" onclick="scanQR()">📷 扫二维码</button></div>
    </div>
    ${lid?`<div class="field"><label>图片（客户端加密上传，零知识）</label>
       <button class="btn-s" onclick="uploadImage('${pid}','${lid}')">🖼 上传图片</button>
       <div class="mt8">${imgHtml||'<span class="muted sm">暂无图片</span>'}</div></div>`:'<div class="muted sm mt8">保存后可上传图片</div>'}
    <div class="bar"><button class="btn-p" onclick="saveLink('${pid}','${lid||''}')">保存</button><button class="btn-s" onclick="closeModal()">取消</button></div>`);
}
async function saveLink(pid,lid){
  const label=$('f_label').value.trim();const url=$('f_url').value.trim();const kind=$('f_kind').value;
  const p=getProject(pid);
  if(lid){const l=getLink(pid,lid);l.label=label;l.url=url;l.kind=kind;}
  else{p.links=p.links||[];p.links.push({id:genId(),label,url,kind,users:[],images:[]});}
  log('edit',label);await saveVault();closeModal();render();toast('已保存','ok');
}
async function delLink(pid,lid){
  const l=getLink(pid,lid);
  if(l&&l.images&&l.images.length)await cleanupImages(l.images);
  const p=getProject(pid);p.links=p.links.filter(x=>x.id!==lid);
  await saveVault();render();toast('已删除链接','ok');
}

// ============================ CRUD：账号-密码对 ============================
function getUser(pid,lid,uid){const l=getLink(pid,lid);return l?(l.users||[]).find(u=>u.id===uid):null;}
function openUser(pid,lid,uid){
  const u=uid?getUser(pid,lid,uid):null;
  openModal(`<h3>${uid?'编辑账号':'新增账号'}</h3>
    <div class="field"><label>作用说明（该用户用途）</label><input id="f_note" value="${esc(u?u.note:'')}" placeholder="如 自己家庭 / 爸妈 / 亲戚临时"></div>
    <div class="field"><label>用户名（可为空）</label><input id="f_uname" value="${esc(u?u.username:'')}"></div>
    <div class="field"><label>密码</label>
      <div class="bar"><input id="f_pwd" type="text" value="${esc(u?u.password:'')}"><button class="btn-s" onclick="genPwd()">🎲 生成</button></div>
    </div>
    <div class="bar"><button class="btn-p" onclick="saveUser('${pid}','${lid}','${uid||''}')">保存</button><button class="btn-s" onclick="closeModal()">取消</button></div>`);
}
function genPwd(){
  const cs='ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnpqrstuvwxyz23456789!@#$%';
  let s='';for(let i=0;i<16;i++)s+=cs[Math.floor(Math.random()*cs.length)];
  $('f_pwd').value=s;toast('已生成','ok');
}
async function saveUser(pid,lid,uid){
  const note=$('f_note').value.trim();const username=$('f_uname').value.trim();const password=$('f_pwd').value;
  const l=getLink(pid,lid);l.users=l.users||[];
  if(uid){const u=getUser(pid,lid,uid);u.note=note;u.username=username;u.password=password;u.updatedAt=now();}
  else{l.users.push({id:genId(),note,username,password,updatedAt:now()});}
  log('edit',note||'账号');await saveVault();closeModal();render();toast('已保存','ok');
}
async function delUser(pid,lid,uid){const l=getLink(pid,lid);l.users=l.users.filter(u=>u.id!==uid);await saveVault();render();toast('已删除账号','ok');}

// ============================ 二维码 / 图片 ============================
function loadImage(file){return new Promise((res,rej)=>{const im=new Image();im.onload=()=>res(im);im.onerror=rej;im.src=URL.createObjectURL(file);});}
function scanQR(){
  const inp=document.createElement('input');inp.type='file';inp.accept='image/*';
  inp.onchange=async()=>{
    const f=inp.files[0];if(!f)return;
    try{
      const im=await loadImage(f);
      const cv=document.createElement('canvas');cv.width=im.width;cv.height=im.height;
      const ctx=cv.getContext('2d');ctx.drawImage(im,0,0);
      const d=ctx.getImageData(0,0,cv.width,cv.height);
      const res=(typeof jsQR!=='undefined')?jsQR(d.data,cv.width,cv.height):null;
      if(res&&res.data){$('f_url').value=res.data;toast('已识别二维码，已填入','ok');}
      else{toast('未识别到二维码','err');}
    }catch(e){toast('二维码解析失败','err');}
  };
  inp.click();
}
function showQR(pid,lid){
  const l=getLink(pid,lid);if(!l||!l.url){toast('该链接没有 URL','err');return;}
  openModal(`<h3>📱 二维码</h3>
    <div id="qrbox" style="display:flex;justify-content:center;padding:8px"></div>
    <div class="field mt12"><label>链接（可复制 / 打开）</label>
      <div class="hash-out">${esc(l.url)}</div>
      <div class="mt8"><button class="btn-s mini" onclick="copyURL('${l.id}')">复制链接</button>
      <button class="btn-s mini" onclick="openURL('${l.id}')">打开</button></div>
    </div>
    <div class="bar mt12"><button class="btn-s" onclick="closeModal()">关闭</button></div>`);
  const box=$('qrbox');
  try{new QRCode(box,{text:l.url,width:200,height:200,correctLevel:QRCode.CorrectLevel.M});}
  catch(e){box.textContent='二维码生成失败：'+(e.message||e);}
}
async function uploadImage(pid,lid){
  const inp=document.createElement('input');inp.type='file';inp.accept='image/*';
  inp.onchange=async()=>{
    const f=inp.files[0];if(!f)return;
    try{
      const buf=await f.arrayBuffer();
      const enc=await encBytes(VKEY,buf);
      const id=genId();
      const r=await fetch(full('/api/upload?id='+id),{method:'PUT',headers:{Authorization:'Bearer '+TOKEN,'Content-Type':'application/octet-stream'},body:JSON.stringify(enc)});
      const j=await r.json();
      if(j.code!==0){toast('上传失败：'+(j.msg||''),'err');return;}
      const l=getLink(pid,lid);l.images=l.images||[];l.images.push({id,name:f.name,type:f.type});
      await saveVault();render();toast('图片已加密上传','ok');
    }catch(e){toast('上传失败','err');}
  };
  inp.click();
}
async function viewImage(pid,lid,iid){
  try{
    const r=await fetch(full('/api/file?id='+iid),{headers:{Authorization:'Bearer '+TOKEN}});
    if(!r.ok){toast('读取失败','err');return;}
    const o=JSON.parse(await r.text());
    const buf=await decBytes(VKEY,o);
    const l=getLink(pid,lid);const im=(l.images||[]).find(x=>x.id===iid)||{};
    const url=URL.createObjectURL(new Blob([buf],{type:im.type||'image/png'}));
    openModal(`<h3>🖼 ${esc(im.name||'图片')}</h3>
      <div style="text-align:center"><img src="${url}" style="max-width:100%;border-radius:10px"></div>
      <div class="bar mt12"><button class="btn-d" onclick="delImage('${pid}','${lid}','${iid}')">🗑 删除</button><button class="btn-s" onclick="closeModal()">关闭</button></div>`);
  }catch(e){toast('解密失败','err');}
}
async function delImage(pid,lid,iid){
  await fetch(full('/api/file?id='+iid),{method:'DELETE',headers:{Authorization:'Bearer '+TOKEN}});
  const l=getLink(pid,lid);l.images=(l.images||[]).filter(x=>x.id!==iid);
  await saveVault();render();closeModal();toast('已删除图片','ok');
}
async function cleanupImages(items){
  for(const im of items){try{await fetch(full('/api/file?id='+im.id),{method:'DELETE',headers:{Authorization:'Bearer '+TOKEN}});}catch(e){}}
}

// ============================ 自算密钥（SHA-256 hex，对齐其他工程） ============================
function openSelf(){
  openModal(`<h3>🧮 自算密钥</h3>
    <div class="muted sm">输入明文 → 输出 SHA-256 小写 hex。可直接粘贴到任意工程的 SCF 环境变量（如 ADMIN_PWD / SUPER_ADMIN_KEY_HASH）。</div>
    <div class="field mt12"><label>明文</label><input id="self_in" type="text" placeholder="输入要换算的密码 / 密钥" onkeydown="if(event.key==='Enter')selfRun()"></div>
    <div class="field"><label>结果（密文 / hex）</label><div id="self_out" class="hash-out hidden"></div></div>
    <div class="bar"><button class="btn-p" onclick="selfRun()">计算</button><button class="btn-s" onclick="closeModal()">关闭</button></div>`);
}
async function selfRun(){
  const plain=$('self_in').value;if(!plain){toast('请输入明文','err');return;}
  const hex=await sha256hex(plain);
  const o=$('self_out');o.classList.remove('hidden');o.innerHTML=`${hex}<div class="mt8"><button class="btn-s mini" onclick="copy('${hex}')">复制密文</button></div>`;
  toast('已生成 SHA-256 密文','ok');
}

// ============================ 导出 / 导入 ============================
async function exportBackup(){
  const blob=await enc(VKEY,JSON.stringify(VAULT));
  const payload={salt:META.salt,iterations:META.iterations,verifier:META.verifier,cipher:b64(JSON.stringify(blob))};
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(payload)],{type:'application/json'}));
  a.download='vault-backup-'+new Date().toISOString().slice(0,10)+'.json';a.click();toast('已导出加密备份','ok');
}
function importBackup(){
  openModal(`<h3>⬆ 导入备份</h3><div class="muted sm">选择一个之前导出的加密备份文件，将覆盖当前保险库。</div>
    <div class="field mt12"><input id="imp" type="file"></div>
    <div class="bar"><button class="btn-p" onclick="doImport()">导入并覆盖</button><button class="btn-s" onclick="closeModal()">取消</button></div>`);
}
async function doImport(){
  const f=$('imp').files[0];if(!f){toast('请选择文件','err');return;}
  const txt=await f.text();const p=JSON.parse(txt);
  META={salt:p.salt,iterations:p.iterations,verifier:p.verifier};
  VKEY=await deriveKey(LOGIN_PWD,unb64(p.salt),p.iterations);
  try{await dec(VKEY,p.verifier);}catch(e){toast('备份与当前密码不匹配','err');return;}
  const blob=JSON.parse(atob(p.cipher));VAULT=JSON.parse(await dec(VKEY,blob));
  await saveVault();closeModal();render();toast('导入成功','ok');
}

// ============================ 回收站 / 日志 ============================
function openTrash(){
  const items=(VAULT.trash||[]).map(t=>`<div class="up"><span class="note">${esc(t.project.name)}</span><span class="muted sm">${new Date(t.deletedAt*1000).toLocaleString()}</span>
    <button class="btn-s mini" onclick="restore('${t.project.id}')">恢复</button><button class="btn-d mini" onclick="purge('${t.project.id}')">彻底删除</button></div>`).join('')||'<div class="muted">回收站为空</div>';
  openModal(`<h3>🗑 回收站</h3>${items}<div class="bar mt12"><button class="btn-s" onclick="closeModal()">关闭</button></div>`);
}
async function restore(id){const i=VAULT.trash.findIndex(t=>t.project.id===id);if(i<0)return;VAULT.projects.unshift(VAULT.trash[i].project);VAULT.trash.splice(i,1);await saveVault();render();closeModal();openTrash();toast('已恢复','ok');}
async function purge(id){VAULT.trash=VAULT.trash.filter(t=>t.project.id!==id);await saveVault();closeModal();openTrash();toast('已彻底删除','ok');}
function openLog(){
  const items=(VAULT.log||[]).slice(0,50).map(l=>`<div class="up"><span class="muted sm">${new Date(l.ts*1000).toLocaleString()}</span><span class="note">${esc(l.action)}</span><span>${esc(l.target||'')}</span>`).join('')||'<div class="muted">暂无记录</div>';
  openModal(`<h3>📜 操作日志</h3>${items}<div class="bar mt12"><button class="btn-s" onclick="closeModal()">关闭</button></div>`);
}
